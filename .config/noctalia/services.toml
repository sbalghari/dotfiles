
[idle]
behavior_order = ["lock", "screen-off", "lock-and-suspend"]
pre_action_fade_seconds = 5.0

[idle.behavior.lock]
action = "lock"
command = ""
enabled = false
resume_command = ""
timeout = 600

[idle.behavior.lock-and-suspend]
action = "lock_and_suspend"
command = ""
enabled = false
resume_command = ""
timeout = 900

[idle.behavior.screen-off]
action = "screen_off"
command = ""
enabled = false
resume_command = ""
timeout = 660

[location]
address = "Skardu, Pakistan"
auto_locate = false
sunrise = ""
sunset = ""

[lockscreen]
blur_intensity = 0.5
blurred_desktop = true
enabled = true
monitors = []
tint_intensity = 0.3
wallpaper = ""

[lockscreen_widgets]
enabled = false

[nightlight]
enabled = true
force = true
temperature_day = 6500
temperature_night = 4000

[notification]
allowed_urgencies = []
background_opacity = 0.7
blacklist = []
blacklist_allow_critical = true
collapse_on_dismiss = true
enable_daemon = true
layer = "top"
monitors = []
offset_x = 5
offset_y = 5
position = "top_right"
scale = 0.9
show_actions = true
show_app_name = true

[osd]
background_opacity = 0.7
monitors = []
offset_x = 20
offset_y = 8
orientation = "horizontal"
position = "bottom_center"
scale = 0.9

[osd.kinds]
bluetooth = true
brightness = true
caffeine = true
dnd = true
keyboard_layout = true
lock_keys = true
power_profile = true
volume = true
volume_input = true
volume_output = true
wifi = true

[system.monitor]
cpu_poll_seconds = 2.0
cpu_temp_activity_threshold = 60.0
cpu_temp_critical_threshold = 85.0
cpu_temp_sensor_path = ""
cpu_usage_activity_threshold = 50.0
cpu_usage_critical_threshold = 90.0
disk_pct_activity_threshold = 80.0
disk_pct_critical_threshold = 95.0
disk_poll_seconds = 10.0
enabled = true
gpu_poll_seconds = 0.0
gpu_temp_activity_threshold = 60.0
gpu_temp_critical_threshold = 85.0
gpu_usage_activity_threshold = 50.0
gpu_usage_critical_threshold = 95.0
gpu_vram_activity_threshold = 50.0
gpu_vram_critical_threshold = 90.0
memory_poll_seconds = 2.0
net_rx_activity_threshold = 1.0
net_rx_critical_threshold = 50.0
net_tx_activity_threshold = 1.0
net_tx_critical_threshold = 50.0
network_poll_seconds = 3.0
ram_pct_activity_threshold = 60.0
ram_pct_critical_threshold = 90.0
swap_pct_activity_threshold = 20.0
swap_pct_critical_threshold = 80.0

[weather]
effects = true
enabled = true
refresh_minutes = 30
unit = "metric"

[audio]
enable_overdrive = false
enable_sounds = true
notification_sound = ""
sound_volume = 0.5
volume_change_sound = ""

[backdrop]
blur_intensity = 0.5
enabled = false
tint_intensity = 0.3

[battery]
warning_threshold = 30

[brightness]
enable_ddcutil = false
ignore_mmids = []

[calendar]
enabled = false
refresh_minutes = 15
